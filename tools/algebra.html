  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f5f0e8; font-family: 'Patrick Hand', cursive; min-height: 100vh; background-image: linear-gradient(#e8e0d0 1px, transparent 1px); background-size: 100% 32px; background-position: 0 24px; }
    body::before { content: ''; position: fixed; left: 72px; top: 0; bottom: 0; width: 2px; background: rgba(255,100,100,0.3); z-index: 0; }
    nav { position: sticky; top: 0; z-index: 10; display: flex; gap: 2rem; padding: 1rem 2rem 1rem 90px; font-size: 1rem; border-bottom: 2px solid rgba(255,100,100,0.2); background: rgba(245,240,232,0.95); flex-wrap: wrap; }
    nav a { color: #888; text-decoration: none; transition: color 0.2s; }
    nav a:hover, nav a.active { color: #e8473f; }
    .page-title { font-family: 'Caveat', cursive; font-size: 0.75rem; color: #bbb; margin-left: auto; align-self: center; }
    .container { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 3rem 2rem 3rem 90px; }
    h1 { font-family: 'Caveat', cursive; font-size: 3rem; color: #2a2a2a; margin-bottom: 0.25rem; }
    .sub { color: #aaa; font-size: 0.9rem; margin-bottom: 2rem; }
    .input-area { background: rgba(255,255,255,0.7); border: 1.5px solid #ddd; border-radius: 4px; padding: 1.5rem; box-shadow: 2px 2px 0 #e0d8c8; margin-bottom: 1.5rem; }
    .hint { color: #bbb; font-size: 0.8rem; margin-bottom: 1rem; }
    .eq-input { width: 100%; background: #fffef9; border: 1.5px solid #ddd; border-radius: 4px; font-family: 'Caveat', cursive; font-size: 1.6rem; padding: 0.6rem 1rem; color: #2a2a2a; outline: none; margin-bottom: 1rem; transition: border-color 0.2s; }
    .eq-input:focus { border-color: #e8473f; }
    .solve-btn { background: #e8473f; border: none; color: #fff; font-family: 'Caveat', cursive; font-size: 1.2rem; padding: 0.6rem 2rem; border-radius: 4px; cursor: pointer; transition: background 0.2s; box-shadow: 2px 2px 0 #c73830; }
    .solve-btn:hover { background: #c73830; }
    .examples { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .eg { background: #fffef9; border: 1px solid #ddd; border-radius: 3px; font-size: 0.8rem; color: #888; padding: 0.2rem 0.5rem; cursor: pointer; transition: all 0.2s; font-family: 'Caveat', cursive; }
    .eg:hover { border-color: #e8473f; color: #e8473f; }
    .steps-area { background: rgba(255,255,255,0.7); border: 1.5px solid #ddd; border-radius: 4px; padding: 1.5rem; box-shadow: 2px 2px 0 #e0d8c8; display: none; }
    .steps-area.show { display: block; }
    .steps-title { font-family: 'Caveat', cursive; font-size: 1.1rem; color: rgba(255,100,100,0.6); margin-bottom: 1rem; text-transform: uppercase; }
    .step { display: flex; gap: 1rem; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px dashed #e8e0d0; }
    .step:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .step-num { background: rgba(255,100,100,0.15); color: #e8473f; font-family: 'Caveat', cursive; font-size: 0.85rem; padding: 0.15rem 0.5rem; border-radius: 3px; white-space: nowrap; min-width: 60px; text-align: center; margin-top: 2px; }
    .step-content { flex: 1; }
    .step-label { color: #888; font-size: 0.85rem; margin-bottom: 0.25rem; }
    .step-math { font-family: 'Caveat', cursive; font-size: 1.4rem; color: #2a2a2a; }
    .highlight { color: #e8473f; }
    .final-answer { background: rgba(255,100,100,0.08); border: 2px solid rgba(255,100,100,0.3); border-radius: 4px; padding: 1rem 1.5rem; margin-top: 1.5rem; }
    .final-label { color: #888; font-size: 0.85rem; }
    .final-value { font-family: 'Caveat', cursive; font-size: 2rem; color: #e8473f; }
    .error { color: #e8473f; font-size: 0.9rem; margin-top: 0.5rem; }
    .footer { margin-top: 3rem; font-size: 0.8rem; color: #bbb; font-family: 'Caveat', cursive; }
  </style>

<body>
  <nav>
    <a href="../index.html">home</a>
    <a href="arithmetic.html">arithmetic</a>
    <a href="algebra.html" class="active">algebra</a>
    <a href="fractions.html">fractions</a>
    <a href="geometry.html">geometry</a>
    <a href="pemdas.html">pemdas</a>
    <a href="../about.html">about</a>
    <span class="page-title">mathpad ✏️</span>
  </nav>
  <div class="container">
    <h1>algebra</h1>
    <p class="sub">// solve linear equations for x, step by step</p>
    <div class="input-area">
      <div class="hint">enter a linear equation with x. examples below:</div>
      <div class="examples">
        <span class="eg" onclick="setEq('2x + 5 = 13')">2x + 5 = 13</span>
        <span class="eg" onclick="setEq('3x - 7 = 14')">3x - 7 = 14</span>
        <span class="eg" onclick="setEq('5x = 30')">5x = 30</span>
        <span class="eg" onclick="setEq('x/4 + 2 = 6')">x/4 + 2 = 6</span>
        <span class="eg" onclick="setEq('2x + 3 = x + 9')">2x + 3 = x + 9</span>
        <span class="eg" onclick="setEq('-3x + 12 = 0')">-3x + 12 = 0</span>
      </div>
      <input class="eq-input" type="text" id="eq" value="2x + 5 = 13" placeholder="e.g. 2x + 5 = 13"/>
      <div class="error" id="err"></div>
      <button class="solve-btn" onclick="solveAlgebra()">solve for x →</button>
    </div>
    <div class="steps-area" id="steps"></div>
    <div class="footer">mathpad — built by zecarrot · v1.0</div>
  </div>
  <script>
    function setEq(v) { document.getElementById('eq').value = v; solveAlgebra(); }

    function solveAlgebra() {
      const raw = document.getElementById('eq').value.trim();
      document.getElementById('err').textContent = '';

      if (!raw.includes('=')) { document.getElementById('err').textContent = 'equation needs an = sign'; return; }

      let [lhs, rhs] = raw.split('=').map(s => s.trim());

      // parse: ax + b = cx + d form
      function parseSide(s) {
        s = s.replace(/\s+/g, '');
        let a = 0, b = 0;
        const terms = s.match(/[+-]?[^+-]+/g) || [];
        for (const t of terms) {
          if (t.includes('x')) {
            const coeff = t.replace('x', '').replace(/\*/, '');
            if (coeff === '' || coeff === '+') a += 1;
            else if (coeff === '-') a -= 1;
            else a += parseFloat(coeff);
          } else {
            b += parseFloat(t) || 0;
          }
        }
        return { a, b };
      }

      try {
        const L = parseSide(lhs);
        const R = parseSide(rhs);

        const netA = L.a - R.a;
        const netB = R.b - L.b;

        if (netA === 0) {
          document.getElementById('err').textContent = netB === 0 ? 'infinite solutions (always true)' : 'no solution (contradiction)';
          return;
        }

        const x = netB / netA;
        const steps = [];

        steps.push({ num: 'step 1', label: 'original equation', math: `${raw}` });

        if (R.a !== 0) {
          steps.push({ num: 'step 2', label: `move x terms to the left (subtract ${R.a}x from both sides)`, math: `${L.a}x ${L.b >= 0 ? '+' : ''} ${L.b} − ${R.a}x = ${R.b}\n→  ${netA}x ${L.b >= 0 ? '+' : ''} ${L.b} = ${R.b}` });
        }

        if (L.b !== 0) {
          const step = R.a !== 0 ? 'step 3' : 'step 2';
          steps.push({ num: step, label: `move constants to the right (${L.b > 0 ? 'subtract' : 'add'} ${Math.abs(L.b)} from both sides)`, math: `${netA}x = ${R.b} ${L.b > 0 ? '−' : '+'} ${Math.abs(L.b)}\n→  ${netA}x = <span class="highlight">${netB}</span>` });
        }

        const divStep = steps.length + 1;
        steps.push({ num: `step ${divStep}`, label: `divide both sides by ${netA}`, math: `x = ${netB} ÷ ${netA}\nx = <span class="highlight">${parseFloat(x.toFixed(6))}</span>` });

        steps.push({ num: `step ${divStep + 1}`, label: 'verify — substitute x back in', math: `left side:  ${lhs.replace(/x/g, `(${x})`)} = ${eval(lhs.replace(/x/g, `(${x})`).replace(/(\d)(x)/g,'$1*$2'))}\nright side: ${rhs.replace(/x/g, `(${x})`)} = ${eval(rhs.replace(/x/g, `(${x})`).replace(/(\d)(x)/g,'$1*$2'))}\n✓ both sides equal` });

        const html = `
          <div class="steps-title">solving for x</div>
          ${steps.map(s => `<div class="step"><div class="step-num">${s.num}</div><div class="step-content"><div class="step-label">${s.label}</div><div class="step-math" style="white-space:pre-line">${s.math}</div></div></div>`).join('')}
          <div class="final-answer"><div class="final-label">solution</div><div class="final-value">x = ${parseFloat(x.toFixed(6))}</div></div>
        `;
        const el = document.getElementById('steps');
        el.innerHTML = html;
        el.classList.add('show');
      } catch(e) {
        document.getElementById('err').textContent = 'could not parse equation — try a format like: 2x + 5 = 13';
      }
    }
  </script>
</body>
</html>
