<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>fractions — mathpad</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f5f0e8; font-family: 'Patrick Hand', cursive; min-height: 100vh; background-image: linear-gradient(#e8e0d0 1px, transparent 1px); background-size: 100% 32px; background-position: 0 24px; }
    body::before { content: ''; position: fixed; left: 72px; top: 0; bottom: 0; width: 2px; background: rgba(255,100,100,0.3); z-index: 0; }
    nav { position: sticky; top: 0; z-index: 10; display: flex; gap: 2rem; padding: 1rem 2rem 1rem 90px; font-size: 1rem; border-bottom: 2px solid rgba(255,100,100,0.2); background: rgba(245,240,232,0.95); flex-wrap: wrap; }
    nav a { color: #888; text-decoration: none; transition: color 0.2s; }
    nav a:hover, nav a.active { color: #e8473f; }
    .page-title { font-family: 'Caveat', cursive; font-size: 0.75rem; color: #bbb; margin-left: auto; align-self: center; }
    .container { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 3rem 2rem 3rem 90px; }
    h1 { font-family: 'Caveat', cursive; font-size: 3rem; color: #2a2a2a; margin-bottom: 0.25rem; }
    .sub { color: #aaa; font-size: 0.9rem; margin-bottom: 2rem; }
    .input-area { background: rgba(255,255,255,0.7); border: 1.5px solid #ddd; border-radius: 4px; padding: 1.5rem; box-shadow: 2px 2px 0 #e0d8c8; margin-bottom: 1.5rem; }
    .frac-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .frac { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .frac input { background: #fffef9; border: 1.5px solid #ddd; border-radius: 4px; font-family: 'Caveat', cursive; font-size: 1.4rem; padding: 0.3rem; width: 70px; text-align: center; color: #2a2a2a; outline: none; transition: border-color 0.2s; }
    .frac input:focus { border-color: #e8473f; }
    .frac-line { width: 70px; height: 2px; background: #2a2a2a; border-radius: 1px; }
    .op-label { font-family: 'Caveat', cursive; font-size: 2rem; color: #888; }
    select { background: #fffef9; border: 1.5px solid #ddd; border-radius: 4px; font-family: 'Patrick Hand', cursive; font-size: 1rem; padding: 0.4rem 0.75rem; color: #2a2a2a; outline: none; cursor: pointer; margin-bottom: 1rem; display: block; }
    .solve-btn { background: #e8473f; border: none; color: #fff; font-family: 'Caveat', cursive; font-size: 1.2rem; padding: 0.6rem 2rem; border-radius: 4px; cursor: pointer; transition: background 0.2s; box-shadow: 2px 2px 0 #c73830; }
    .solve-btn:hover { background: #c73830; }
    .steps-area { background: rgba(255,255,255,0.7); border: 1.5px solid #ddd; border-radius: 4px; padding: 1.5rem; box-shadow: 2px 2px 0 #e0d8c8; display: none; }
    .steps-area.show { display: block; }
    .steps-title { font-family: 'Caveat', cursive; font-size: 1.1rem; color: rgba(255,100,100,0.6); margin-bottom: 1rem; text-transform: uppercase; }
    .step { display: flex; gap: 1rem; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px dashed #e8e0d0; }
    .step:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .step-num { background: rgba(255,100,100,0.15); color: #e8473f; font-family: 'Caveat', cursive; font-size: 0.85rem; padding: 0.15rem 0.5rem; border-radius: 3px; white-space: nowrap; min-width: 60px; text-align: center; margin-top: 2px; }
    .step-content { flex: 1; }
    .step-label { color: #888; font-size: 0.85rem; margin-bottom: 0.25rem; }
    .step-math { font-family: 'Caveat', cursive; font-size: 1.4rem; color: #2a2a2a; white-space: pre-line; }
    .highlight { color: #e8473f; }
    .final-answer { background: rgba(255,100,100,0.08); border: 2px solid rgba(255,100,100,0.3); border-radius: 4px; padding: 1rem 1.5rem; margin-top: 1.5rem; }
    .final-label { color: #888; font-size: 0.85rem; }
    .final-value { font-family: 'Caveat', cursive; font-size: 2rem; color: #e8473f; }
    .footer { margin-top: 3rem; font-size: 0.8rem; color: #bbb; font-family: 'Caveat', cursive; }
  </style>
</head>
<body>
  <nav>
    <a href="../index.html">home</a>
    <a href="arithmetic.html">arithmetic</a>
    <a href="algebra.html">algebra</a>
    <a href="fractions.html" class="active">fractions</a>
    <a href="geometry.html">geometry</a>
    <a href="pemdas.html">pemdas</a>
    <a href="../about.html">about</a>
    <span class="page-title">mathpad ✏️</span>
  </nav>
  <div class="container">
    <h1>fractions</h1>
    <p class="sub">// add, subtract, multiply, divide fractions — every step shown</p>
    <div class="input-area">
      <select id="fop">
        <option value="+">+ addition</option>
        <option value="-">− subtraction</option>
        <option value="*">× multiplication</option>
        <option value="/">÷ division</option>
      </select>
      <div class="frac-row">
        <div class="frac">
          <input type="number" id="n1" value="2"/>
          <div class="frac-line"></div>
          <input type="number" id="d1" value="3"/>
        </div>
        <span class="op-label" id="op-display">+</span>
        <div class="frac">
          <input type="number" id="n2" value="1"/>
          <div class="frac-line"></div>
          <input type="number" id="d2" value="4"/>
        </div>
      </div>
      <button class="solve-btn" onclick="solveFrac()">show steps →</button>
    </div>
    <div class="steps-area" id="steps"></div>
    <div class="footer">mathpad — built by zecarrot · v1.0</div>
  </div>
  <script>
    document.getElementById('fop').addEventListener('change', e => {
      const s = { '+':'+', '-':'−', '*':'×', '/':'÷' };
      document.getElementById('op-display').textContent = s[e.target.value];
    });

    function gcd(a, b) { a = Math.abs(a); b = Math.abs(b); while(b) { [a,b] = [b, a%b]; } return a; }
    function lcm(a, b) { return Math.abs(a*b)/gcd(a,b); }
    function simplify(n, d) { const g = gcd(Math.abs(n), Math.abs(d)); return [n/g, d/g]; }
    function fracStr(n, d) { if (d === 1) return `${n}`; return `${n}/${d}`; }

    function solveFrac() {
      const n1 = parseInt(document.getElementById('n1').value);
      const d1 = parseInt(document.getElementById('d1').value);
      const n2 = parseInt(document.getElementById('n2').value);
      const d2 = parseInt(document.getElementById('d2').value);
      const op = document.getElementById('fop').value;
      const opS = { '+':'+', '-':'−', '*':'×', '/':'÷' };

      if (d1 === 0 || d2 === 0) { alert("denominators can't be zero"); return; }

      let steps = [];
      let rn, rd;

      steps.push({ num: 'step 1', label: 'write the problem', math: `${fracStr(n1,d1)}  ${opS[op]}  ${fracStr(n2,d2)}` });

      if (op === '+' || op === '-') {
        const l = lcm(d1, d2);
        const m1 = l/d1, m2 = l/d2;
        const nn1 = n1*m1, nn2 = n2*m2;
        steps.push({ num: 'step 2', label: `find the LCD of ${d1} and ${d2}`, math: `LCD = ${l}` });
        steps.push({ num: 'step 3', label: 'convert both fractions to the LCD', math: `${n1}/${d1} = ${nn1}/${l}  (multiply top and bottom by ${m1})\n${n2}/${d2} = ${nn2}/${l}  (multiply top and bottom by ${m2})` });
        rn = op === '+' ? nn1 + nn2 : nn1 - nn2;
        rd = l;
        steps.push({ num: 'step 4', label: `${op === '+' ? 'add' : 'subtract'} the numerators`, math: `${nn1} ${opS[op]} ${nn2} = ${rn}\nresult: ${rn}/${rd}` });
      } else if (op === '*') {
        steps.push({ num: 'step 2', label: 'multiply numerators together, denominators together', math: `(${n1} × ${n2}) / (${d1} × ${d2})\n= ${n1*n2} / ${d1*d2}` });
        rn = n1*n2; rd = d1*d2;
      } else {
        steps.push({ num: 'step 2', label: 'flip the second fraction (reciprocal) and multiply', math: `${fracStr(n1,d1)}  ÷  ${fracStr(n2,d2)}\n= ${fracStr(n1,d1)}  ×  ${fracStr(d2,n2)}` });
        rn = n1*d2; rd = d1*n2;
        steps.push({ num: 'step 3', label: 'multiply across', math: `(${n1} × ${d2}) / (${d1} × ${n2})\n= ${rn} / ${rd}` });
      }

      const [sn, sd] = simplify(rn, rd);
      if (sn !== rn || sd !== rd) {
        const g = gcd(Math.abs(rn), Math.abs(rd));
        steps.push({ num: `step ${steps.length + 1}`, label: `simplify — divide both by GCD (${g})`, math: `${rn}/${rd}  →  <span class="highlight">${fracStr(sn,sd)}</span>` });
      }

      const decimal = sn/sd;
      const html = `
        <div class="steps-title">working — fractions</div>
        ${steps.map(s => `<div class="step"><div class="step-num">${s.num}</div><div class="step-content"><div class="step-label">${s.label}</div><div class="step-math">${s.math}</div></div></div>`).join('')}
        <div class="final-answer">
          <div class="final-label">answer</div>
          <div class="final-value">${fracStr(sn,sd)}${sd !== 1 ? `  =  ${parseFloat(decimal.toFixed(6))}` : ''}</div>
        </div>
      `;
      const el = document.getElementById('steps');
      el.innerHTML = html;
      el.classList.add('show');
    }
  </script>
</body>
</html>
